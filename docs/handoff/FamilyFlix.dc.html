<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="tokens.css" />
      </helmet>
      <div style="{{ rootStyle }}">
        <!-- ============================= BROWSE ============================= -->
        <sc-if value="{{ isBrowse }}" hint-placeholder-val="{{ true }}">
          <dc-import
            name="page.LibraryPage"
            lib="{{ libModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= GENRE OVERVIEW ============================= -->
        <sc-if value="{{ isGenre }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="page.GenrePage"
            genre="{{ genreModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= DETAIL ============================= -->
        <sc-if value="{{ isDetail }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="page.MoviePage"
            detail="{{ detailModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= PLAYER ============================= -->
        <sc-if value="{{ isPlayer }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="feat.PlayerControls"
            p="{{ playerModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= ADD MOVIE ============================= -->
        <sc-if value="{{ isAdd }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="feat.MovieForm"
            form="{{ formModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= IMPORT ============================= -->
        <sc-if value="{{ isImport }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="feat.ImportFlow"
            imp="{{ importModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= SETTINGS ============================= -->
        <sc-if value="{{ isSettings }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="page.SettingsPage"
            settings="{{ settingsModel }}"
            style="position: absolute; inset: 0"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= EXPORT MODAL (feat.ExportModal) ============================= -->
        <sc-if value="{{ exportOpen }}" hint-placeholder-val="{{ false }}">
          <dc-import
            name="feat.ExportModal"
            data="{{ exportModel }}"
            style="position: absolute; inset: 0; z-index: 90"
            hint-size="100%,100%"
          ></dc-import>
        </sc-if>

        <!-- ============================= SNACKBAR HOST ============================= -->
        <sc-if value="{{ hasSnackbars }}" hint-placeholder-val="{{ false }}">
          <div
            style="
              position: absolute;
              right: 24px;
              bottom: 24px;
              z-index: 200;
              display: flex;
              flex-direction: column-reverse;
              gap: 12px;
              align-items: flex-end;
              pointer-events: none;
            "
          >
            <sc-for list="{{ snackbars }}" as="n" hint-placeholder-count="1">
              <div style="pointer-events: auto">
                <dc-import
                  name="mol.Snackbar"
                  variant="{{ n.variant }}"
                  title="{{ n.title }}"
                  message="{{ n.message }}"
                  action-label="{{ n.actionLabel }}"
                  on-action="{{ n.action }}"
                  dismissible="{{ n.dismissible }}"
                  on-dismiss="{{ n.onDismiss }}"
                  hint-size="360px,80px"
                ></dc-import>
              </div>
            </sc-for>
          </div>
        </sc-if>
      </div>
    </x-dc>
    <script

    >
      class Component extends DCLogic {
        rawMovies = [
          {id:1,title:'The Lantern Keeper',year:2019,genres:['Drama','Family'],runtime:112,st:'watched',prog:0,g1:'#3a2d1f',g2:'#7a5226',syn:'A lighthouse keeper on a fading coast takes in a runaway girl, and the two slowly rebuild a family out of the wreckage of the season. As winter closes the harbor and the supply boats stop coming, they learn that the light they tend is the only thing keeping either of them from drifting out to sea. Told across a single long winter, the film follows their wary, deepening companionship as old griefs surface and the storms outside mirror the ones within. When a wrecked sailor washes ashore with news from the girl\u2019s past, the fragile peace they\u2019ve built is tested, and the keeper must decide whether holding on means letting go. A quiet, tender story about the families we choose when the ones we were given have gone dark.',added:1},
          {id:2,title:'Salt and Cedar',year:2021,genres:['Drama','Romance'],runtime:124,st:'progress',prog:38,g1:'#243a36',g2:'#5e7a6a',syn:'Two strangers share a long ferry crossing and discover their lives have quietly circled one another for twenty years.',added:6},

          {id:5,title:'The Glasshouse',year:2022,genres:['Thriller','Drama'],runtime:131,st:'progress',prog:12,g1:'#1f2433',g2:'#4a4f6e',syn:'An architect returns to the modernist house she built for a client who has since vanished without a trace.',added:14},
          {id:6,title:'Orbit of Small Things',year:2023,genres:['Sci-Fi','Drama'],runtime:109,st:'unwatched',prog:0,g1:'#25203f',g2:'#6a55a0',syn:'On a research station at the edge of the system, a botanist measures her loneliness against a garden that refuses to die.',added:16},
          {id:7,title:'Marigold Avenue',year:2017,genres:['Comedy','Romance'],runtime:101,st:'unwatched',prog:0,g1:'#4a2f2a',g2:'#c06a4a',syn:'Everyone on one sun-drenched street is in love with the wrong neighbor, and the local baker knows all of it.',added:7},

          {id:11,title:'Grandfather\u2019s Clock',year:2015,genres:['Family','Drama'],runtime:95,st:'unwatched',prog:0,g1:'#3a2f24',g2:'#84603f',syn:'When the old clock stops, a family realizes none of them remember how it was wound \u2014 or by whom.',added:4},

          {id:14,title:'Tin Can Symphony',year:2018,genres:['Comedy'],runtime:92,st:'unwatched',prog:0,g1:'#3a2a3a',g2:'#8a5a7a',syn:'A failing junkyard becomes an accidental concert hall when the scrap starts, somehow, to sing.',added:8},
          {id:15,title:'The Far Meridian',year:2022,genres:['Sci-Fi'],runtime:134,st:'unwatched',prog:0,g1:'#1f2333',g2:'#454a7a',syn:'A woman wakes each morning to find her lighthouse has drifted to a different shore on a different ocean.',added:13},
          {id:16,title:'Almond Blossom',year:2014,genres:['Romance','Drama'],runtime:103,st:'watched',prog:0,g1:'#3f2a2f',g2:'#a05a6a',syn:'Two letter-writers fall in love across a border that will not let them meet, for one long blossoming spring.',added:12},
          {id:17,title:'Riverkeep',year:2023,genres:['Adventure','Family'],runtime:110,st:'unwatched',prog:0,g1:'#243530',g2:'#4f8060',syn:'The last family to tend a wild river guards it for one final summer before the dam arrives.',added:17},
          {id:18,title:'Nightjar',year:2019,genres:['Crime','Drama'],runtime:116,st:'unwatched',prog:0,g1:'#23211f',g2:'#544c3e',syn:'A night-shift cab driver becomes the unwilling witness to a city\u2019s small after-dark crimes.',added:15},
          {id:19,title:'The Cartographer',year:2021,genres:['Documentary'],runtime:88,st:'unwatched',prog:0,g1:'#2f2a20',g2:'#7a6a3a',syn:'A portrait of the last man hand-drawing maps of places that no longer match their own coastlines.',added:19},
          {id:20,title:'Saturday\u2019s Children',year:2017,genres:['Drama','Comedy'],runtime:99,st:'unwatched',prog:0,g1:'#332a2a',g2:'#7a5a4a',syn:'Five siblings reunite in their childhood home for one chaotic, tender weekend of unfinished arguments.',added:20},
        ];
        genrePool = ['Action','Comedy','Drama','Horror','Thriller','Sci-Fi','Romance','Documentary','Animation','Family','Adventure','Crime'];
        langPool = ['English','Spanish','French','German','Portuguese','Italian','Dutch'];
        sortDefs = [['recent','Recently Added'],['az','Title (A\u2013Z)'],['year','Year'],['unwatched','Unwatched First'],['rating','Highest Rated']];
        ratings = {1:90,2:80,3:70,4:60,5:80,6:90,7:50,8:70,9:60,10:80,11:70,12:90,13:50,14:40,15:80,16:70,17:60,18:50,19:70,20:60};
        ratingDefs = [['0','All ratings'],['80','4+ stars'],['60','3+ stars'],['40','2+ stars']];
        credits = {

        state = {
          screen:'browse', selectedId:null,
          search:'', genre:'All Genres', sort:'recent', ratingFilter:'0',
          fRating:0, fRatingHover:null,
          openDrop:null, gearOpen:false, editMenuOpen:false, overrides:{}, favorites:[4,12,16],
          genreView:null, genreSearch:'', detailReturn:'browse',
          playing:true, currentTime:0, subsOn:true, muted:false, volume:0.8, controlsVisible:true,
          addMode:'folder', folderPath:'', scanned:false,
          fTitle:'', fYear:'', fDirector:'', fCast:'', fDescription:'', fGenres:[], fVideo:'', fPoster:'', fSubs:[], subLangOpen:null,
          addContext:null, resolveId:null,
          impStep:'setup', impSheet:'', impRoot:'', impProgress:0, impMatched:0, impProblems:[],
          impPhase:'scan', impFound:0, impTotal:0, impDone:0, impCurrent:'', impLog:[], impStartTime:null,
          exportOpen:false, exportFormat:'csv', exportDone:false,
          settingsSubAuto:false, settingsSubLang:'English',
          codecs:[
            {id:1,name:'H.264 / AVC',exts:['.mp4','.mov','.m4v'],kind:'built-in',size:'—'},
            {id:2,name:'AAC Audio',exts:['.mp4','.m4a'],kind:'built-in',size:'—'},
            {id:3,name:'VP9',exts:['.webm'],kind:'built-in',size:'—'},
            {id:4,name:'H.265 / HEVC',exts:['.mkv','.mp4'],kind:'installed',size:'4.2 MB'},
            {id:5,name:'AV1',exts:['.mkv','.webm'],kind:'installed',size:'6.8 MB'},
            {id:6,name:'AC-3 / Dolby Digital',exts:['.mkv','.avi'],kind:'installed',size:'1.1 MB'},
          ],
          codecJustAdded:null,
          snackbars:[], updateAvailable:true, updateVersion:'1.1.0', currentVersion:'1.0.0', updating:false, lastChecked:null,
        };
        _snackSeq = 0;
        lastMove = Date.now();

        componentDidMount(){
          this._updateTimer = setTimeout(()=>this.offerUpdate(), 1600);
          this.timer = setInterval(()=>{
            const s=this.state;
            if(s.screen==='player'){
              const dur=this.durationOf(); const patch={};
              if(s.playing && s.currentTime<dur) patch.currentTime=Math.min(dur,s.currentTime+0.25);
              if(s.playing && Date.now()-this.lastMove>3000 && s.controlsVisible) patch.controlsVisible=false;
              if(Object.keys(patch).length) this.setState(patch);
            } else if(s.screen==='import' && s.impStep==='running'){
              if(s.impPhase==='scan'){
                const target=1240;
                const found=Math.min(target, s.impFound + (40+Math.floor(Math.random()*95)));
                const path=this.fakePath(s.impRoot, found);
                const log=this.appendLog(s.impLog, {text:'Scanning   '+path, kind:'scan'});
                if(found>=target){
                  this.setState({impFound:target, impTotal:target, impPhase:'import', impCurrent:'',
                    impLog:this.appendLog(log, {text:'✓ Found '+target.toLocaleString()+' movies across '+s.impFound.toLocaleString()+' folders. Starting import…', kind:'success'})});
                } else {
                  this.setState({impFound:found, impCurrent:path, impLog:log});
                }
              } else {
                const done=Math.min(s.impTotal, s.impDone + (28+Math.floor(Math.random()*42)));
                const item=this.fakeTitle(done);
                let kind='success', text='✓ Imported   '+item;
                const r=Math.random();
                if(r<0.07){ kind='warning'; text='⚠ '+item+' — no subtitle track found'; }
                else if(r<0.10){ kind='warning'; text='⚠ '+item+' — multiple folder matches'; }
                const log=this.appendLog(s.impLog, {text, kind});
                if(done>=s.impTotal){
                  const probs=this.seedProblems();
                  this.setState({impDone:s.impTotal, impStep:'review', impMatched:s.impTotal-probs.length, impProblems:probs,
                    impLog:this.appendLog(log, {text:'✓ Import complete — '+(s.impTotal-probs.length).toLocaleString()+' imported, '+probs.length+' need attention.', kind:'success'})});
                } else {
                  this.setState({impDone:done, impCurrent:item, impLog:log});
                }
              }
            }
          },220);
        }
        componentWillUnmount(){ clearInterval(this.timer); }

        // ---- helpers ----
        eff(m){ return this.state.overrides[m.id]!=null ? this.state.overrides[m.id] : m.st; }
        durationOf(){ const m=this.cur(); return m? m.runtime*60 : 0; }
        cur(){ return this.rawMovies.find(m=>m.id===this.state.selectedId)||null; }
        fmtClock(sec){ sec=Math.max(0,Math.floor(sec)); const h=Math.floor(sec/3600),mm=Math.floor(sec%3600/60),ss=sec%60; const p=n=>String(n).padStart(2,'0'); return h>0?`${h}:${p(mm)}:${p(ss)}`:`${mm}:${p(ss)}`; }
        posterStyleOf(m){ return {position:'absolute',inset:0,background:`linear-gradient(155deg, ${m.g1} 0%, ${m.g2} 100%)`}; }
        ratingOf(m){ return this.ratings[m.id]!=null ? this.ratings[m.id] : 0; }
        starParts(pct,size){ return {
          wrapStyle:{position:'relative',display:'inline-block',fontSize:size+'px',lineHeight:1,letterSpacing:Math.round(size*0.14)+'px',flex:'0 0 auto',whiteSpace:'nowrap'},
          fillStyle:{position:'absolute',left:0,top:0,height:'100%',width:Math.max(0,Math.min(100,pct))+'%',overflow:'hidden',color:'var(--color-accent)',whiteSpace:'nowrap'},
        }; }
        starText(pct){ return (Math.round(pct/20*2)/2).toFixed(1); }
        view(m){ const e=this.eff(m); return {
          id:m.id,title:m.title,year:m.year,genres:m.genres,topTag:m.genres[0]+' · '+m.year,
          posterStyle:this.posterStyleOf(m), barStyle:{height:'100%',width:m.prog+'%',background:'var(--color-accent)'},
          isWatched:e==='watched', isProgress:e==='progress',
          isFav:this.state.favorites.includes(m.id), notFav:!this.state.favorites.includes(m.id), toggleFav:(ev)=>{ if(ev&&ev.stopPropagation)ev.stopPropagation(); this.toggleFavById(m.id); },
          card:{title:m.title,g1:m.g1,g2:m.g2,rating:this.ratingOf(m),watched:e==='watched',progress:e==='progress'?m.prog:0,favorite:this.state.favorites.includes(m.id)},
          continueCard:{title:m.title,g1:m.g1,g2:m.g2,progress:m.prog,resumeLabel:'Resume \u00b7 '+this.fmtClock(m.runtime*60*m.prog/100)+' of '+this.fmtClock(m.runtime*60)},
          starWrap:this.starParts(this.ratingOf(m),13).wrapStyle, starFill:this.starParts(this.ratingOf(m),13).fillStyle, ratingText:this.starText(this.ratingOf(m)),
          resumeLabel:'Resume \u00b7 '+this.fmtClock(m.runtime*60*m.prog/100)+' of '+this.fmtClock(m.runtime*60),
          open:()=>this.openDetail(m.id),
        }; }

        // ---- nav ----
        openDetail(id){ this.setState(s=>({screen:'detail',selectedId:id,openDrop:null,gearOpen:false,editMenuOpen:false,detailReturn:s.screen==='genre'?'genre':'browse'})); }
        backFromDetail(){ this.setState(s=>({screen:s.detailReturn==='genre'?'genre':'browse',playing:false,editMenuOpen:false})); }
        goBrowse(){ this.setState({screen:'browse',playing:false,gearOpen:false,openDrop:null,editMenuOpen:false,impStep:'setup',impProgress:0,addContext:null}); }
        goAdd(){ this.resetForm(); this.setState({screen:'add',gearOpen:false,addContext:'settings',resolveId:null}); }
        goImport(){ this.setState({screen:'import',gearOpen:false,impStep:'setup',impProgress:0}); }
        goSettings(){ this.setState({screen:'settings',gearOpen:false,openDrop:null}); }
        uploadCodec(){ this.setState(s=>{ const id=Math.max(0,...s.codecs.map(c=>c.id))+1; const packs=[{name:'DTS Audio',exts:['.mkv','.dts'],size:'2.3 MB'},{name:'ProRes',exts:['.mov'],size:'9.4 MB'},{name:'FLAC Audio',exts:['.mkv','.flac'],size:'0.8 MB'},{name:'Theora',exts:['.ogv'],size:'1.6 MB'}]; const p=packs[s.codecs.filter(c=>c.kind==='installed').length % packs.length]; return {codecs:[...s.codecs,{id,name:p.name,exts:p.exts,kind:'installed',size:p.size}],codecJustAdded:id}; }); }
        removeCodec(id){ this.setState(s=>({codecs:s.codecs.filter(c=>c.id!==id),codecJustAdded:s.codecJustAdded===id?null:s.codecJustAdded})); }
        setSubLang(v){ this.setState({settingsSubLang:v,openDrop:null}); }
        toggleSubAuto(){ this.setState(s=>({settingsSubAuto:!s.settingsSubAuto})); }

        // ---- snackbars ----
        pushSnack(snack){ const id=++this._snackSeq; this.setState(s=>({snackbars:[...s.snackbars, {...snack, id}]})); if(snack.duration){ setTimeout(()=>this.dismissSnack(id), snack.duration); } return id; }
        dismissSnack(id){ this.setState(s=>({snackbars:s.snackbars.filter(n=>n.id!==id)})); }

        // ---- software update ----
        offerUpdate(){ if(!this.state.updateAvailable || this._updateOffered) return; this._updateOffered=true; this._updateSnackId = this.pushSnack({variant:'info', title:'Update available', message:'FamilyFlix '+this.state.updateVersion+' is ready to install.', actionLabel:'Update now', action:()=>this.runUpdate(), dismissible:true}); }
        runUpdate(){ if(this.state.updating) return; if(this._updateSnackId) this.dismissSnack(this._updateSnackId); this.setState({updating:true}); setTimeout(()=>{ const v=this.state.updateVersion; this.setState({currentVersion:v, updateAvailable:false, updating:false, lastChecked:'just now'}); this.pushSnack({variant:'success', message:'FamilyFlix updated to '+v+'.', duration:5000, dismissible:true}); }, 1700); }
        checkForUpdates(){ this.setState({lastChecked:'just now'}); if(this.state.updateAvailable){ this.offerUpdate(); } else { this.pushSnack({variant:'success', message:'You’re on the latest version.', duration:4000, dismissible:true}); } }
        openExport(){ this.setState({gearOpen:false,exportOpen:true,exportDone:false,exportFormat:'csv'}); }
        closeExport(){ this.setState({exportOpen:false,exportDone:false}); }
        setExportFormat(f){ this.setState({exportFormat:f,exportDone:false}); }
        runExport(){ this.setState({exportDone:true}); }
        stopProp(e){ if(e&&e.stopPropagation)e.stopPropagation(); }
        chooseCsv(){ this.setExportFormat('csv'); }
        chooseXlsx(){ this.setExportFormat('xlsx'); }
        openGenre(name){ this.setState({screen:'genre',genreView:name,genreSearch:'',gearOpen:false,openDrop:null}); }
        onGenreSearch(e){ this.setState({genreSearch:e.target.value}); }

        // ---- browse ----
        onSearch(e){ this.setState({search:e.target.value}); }
        toggleGenre(){ this.setState(s=>({openDrop:s.openDrop==='genre'?null:'genre',gearOpen:false})); }
        toggleSort(){ this.setState(s=>({openDrop:s.openDrop==='sort'?null:'sort',gearOpen:false})); }
