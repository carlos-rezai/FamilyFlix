<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="stylesheet" href="tokens.css" />
      </helmet>
      <div
        data-screen-label="Add Movie"
        style="height: 100%; overflow-y: auto; background: var(--color-bg-2)"
      >
        <div
          style="
            max-width: 760px;
            margin: 0 auto;
            padding: var(--space-6) var(--space-6) var(--space-8);
          "
        >
          <sc-if
            value="{{ form.inImportContext }}"
            hint-placeholder-val="{{ false }}"
          >
            <div
              style="
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                margin-bottom: 20px;
                background: var(--color-accent-soft);
                border: 1px solid var(--color-accent-line);
                border-radius: var(--radius-md);
                font-family: var(--font-sans);
                font-size: 14px;
                color: var(--color-text);
              "
            >
              <span style="color: var(--color-accent); font-weight: 600"
                >Resolving import</span
              ><span style="color: var(--color-text-dim)"
                >{{ form.resolveLabel }}</span
              >
            </div>
          </sc-if>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 16px;
              margin-bottom: 8px;
            "
          >
            <dc-import
              name="prim.IconButton"
              icon="back"
              variant="outline"
              size="42"
              title="Back"
              on-click="{{ form.onBack }}"
              hint-size="42px,42px"
            ></dc-import>
            <h1
              style="
                font-family: var(--font-serif);
                font-weight: 600;
                font-size: 30px;
                color: var(--color-text);
                margin: 0;
              "
            >
              {{ form.heading }}
            </h1>
          </div>
          <p
            style="
              font-family: var(--font-sans);
              font-size: 15px;
              color: var(--color-text-faint);
              margin: 0 0 28px 58px;
            "
          >
            Pick the video, poster, and any subtitle files for this movie. To
            add many at once, use
            <span style="color: var(--color-text-dim); font-weight: 500"
              >Import library</span
            >.
          </p>

          <div style="display: flex; flex-direction: column; gap: 22px">
            <div style="display: flex; gap: 18px">
              <label style="flex: 1; display: block">
                <span style="{{ form.labelStyle }}">Title</span>
                <input
                  value="{{ form.title }}"
                  onInput="{{ form.onTitle }}"
                  placeholder="Movie title"
                  style="{{ form.inputStyle }}"
                  style-focus="border-color:var(--color-accent-line)"
                />
              </label>
              <label style="flex: 0 0 150px; display: block">
                <span style="{{ form.labelStyle }}">Year</span>
                <input
                  value="{{ form.year }}"
                  onInput="{{ form.onYear }}"
                  placeholder="2019"
                  style="{{ form.inputStyle }}"
                  style-focus="border-color:var(--color-accent-line)"
                />
              </label>
            </div>

            <div style="display: flex; gap: 18px">
              <label style="flex: 1; display: block">
                <span style="{{ form.labelStyle }}">Director</span>
                <input
                  value="{{ form.director }}"
                  onInput="{{ form.onDirector }}"
                  placeholder="Director name"
                  style="{{ form.inputStyle }}"
                  style-focus="border-color:var(--color-accent-line)"
                />
              </label>
              <label style="flex: 1; display: block">
                <span style="{{ form.labelStyle }}"
                  >Cast
                  <span style="color: var(--color-text-faint); font-weight: 400"
                    >— separate with commas</span
                  ></span
                >
                <input
                  value="{{ form.cast }}"
                  onInput="{{ form.onCast }}"
                  placeholder="e.g. Jane Doe, John Roe"
                  style="{{ form.inputStyle }}"
                  style-focus="border-color:var(--color-accent-line)"
                />
              </label>
            </div>

            <label style="display: block">
              <span style="{{ form.labelStyle }}">Description</span>
              <dc-import
                name="prim.Textarea"
                value="{{ form.description }}"
                on-input="{{ form.onDescription }}"
                placeholder="A short synopsis of the movie"
                min-height="96"
                hint-size="100%,96px"
              ></dc-import>
            </label>

            <div>
              <span style="{{ form.labelStyle }}"
                >Genre
                <span style="color: var(--color-text-faint); font-weight: 400"
                  >— pick one or more</span
                ></span
              >
              <div
                style="
                  display: flex;
                  flex-wrap: wrap;
                  gap: 9px;
                  margin-top: 4px;
                "
              >
                <sc-for
                  list="{{ form.genreChips }}"
                  as="c"
                  hint-placeholder-count="12"
                >
                  <button onClick="{{ c.toggle }}" style="{{ c.style }}">
                    {{ c.label }}
                  </button>
                </sc-for>
              </div>
            </div>

            <div>
              <span style="{{ form.labelStyle }}"
                >Your rating
                <span style="color: var(--color-text-faint); font-weight: 400"
                  >— click a star (or half)</span
                ></span
              >
              <div style="margin-top: 4px">
                <dc-import
                  name="mol.RatingPicker"
                  value="{{ form.rating }}"
                  on-change="{{ form.onRating }}"
                  hint-size="260px,40px"
                ></dc-import>
              </div>
            </div>

            <div
              style="
                display: flex;
                flex-direction: column;
                gap: 14px;
                padding: 20px;
                background: var(--color-surface);
                border: 1px solid var(--color-border-soft);
                border-radius: var(--radius-md);
              "
            >
              <div
                style="
                  font-family: var(--font-sans);
                  font-size: 12px;
                  font-weight: 600;
                  letter-spacing: 0.8px;
                  text-transform: uppercase;
                  color: var(--color-text-faint);
                "
              >
                Files
              </div>

              <dc-import
                name="mol.FileField"
                label="Video"
                filename="{{ form.video }}"
                choose-label="Choose video file"
                icon="video"
                on-pick="{{ form.pickVideo }}"
                on-remove="{{ form.removeVideo }}"
                hint-size="100%,42px"
              ></dc-import>
              <dc-import
                name="mol.FileField"
                label="Poster"
                filename="{{ form.poster }}"
                choose-label="Choose poster image"
                icon="poster"
                on-pick="{{ form.pickPoster }}"
                on-remove="{{ form.removePoster }}"
                hint-size="100%,42px"
              ></dc-import>

              <div style="display: flex; gap: 12px">
                <div
                  style="
                    flex: 0 0 70px;
                    font-family: var(--font-sans);
                    font-size: 14px;
                    color: var(--color-text-dim);
                    padding-top: 10px;
                  "
                >
                  Subtitles
                </div>
                <div
                  style="
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    min-width: 0;
                  "
                >
                  <sc-for
                    list="{{ form.subtitles }}"
                    as="s"
                    hint-placeholder-count="2"
                  >
                    <dc-import
                      name="mol.SubtitleRow"
                      filename="{{ s.filename }}"
                      lang="{{ s.lang }}"
                      lang-options="{{ form.langOptions }}"
                      on-lang-change="{{ s.onLangChange }}"
                      on-remove="{{ s.remove }}"
                      hint-size="100%,48px"
                    ></dc-import>
                  </sc-for>
                  <button
                    onClick="{{ form.addSub }}"
                    style="
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      gap: 6px;
                      height: 42px;
                      background: transparent;
                      border: 1px dashed var(--color-border);
                      border-radius: 8px;
                      color: var(--color-text-dim);
                      font-family: var(--font-sans);
                      font-size: 13px;
                      font-weight: 600;
                      cursor: pointer;
                    "
                    style-hover="border-color:var(--color-accent-line);color:var(--color-text)"
                  >
                    ＋ Add subtitle file
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 14px;
              margin-top: 32px;
            "
          >
            <dc-import
              name="prim.Button"
              label="{{ form.saveLabel }}"
              variant="primary"
              size="md"
              icon="none"
              on-click="{{ form.onSave }}"
              hint-size="160px,50px"
            ></dc-import>
            <dc-import
              name="prim.Button"
              label="{{ form.cancelLabel }}"
              variant="secondary"
              size="md"
              icon="none"
              on-click="{{ form.onBack }}"
              hint-size="120px,50px"
            ></dc-import>
          </div>
        </div>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":820,"height":700},"form":{"editor":null,"tsType":"MovieFormModel"}}'
    ></script>
  </body>
</html>
