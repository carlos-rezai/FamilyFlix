<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="stylesheet" href="tokens.css" />
      </helmet>
      <div style="display: flex; gap: 12px">
        <div
          style="
            flex: 0 0 70px;
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--color-text-dim);
            padding-top: 10px;
          "
        >
          {{ label }}
        </div>
        <div style="flex: 1; min-width: 0">
          <sc-if value="{{ hasFile }}" hint-placeholder-val="{{ false }}">
            <div
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 7px 10px;
                background: var(--color-bg-2);
                border: 1px solid var(--color-border-soft);
                border-radius: 8px;
              "
            >
              <span
                style="
                  flex: 0 0 auto;
                  display: grid;
                  place-items: center;
                  color: var(--color-text-faint);
                "
                >{{ iconEl }}</span
              >
              <span
                style="
                  flex: 1;
                  font-family: var(--font-mono);
                  font-size: 13px;
                  color: var(--color-text-dim);
                  overflow: hidden;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                  min-width: 0;
                "
                >{{ filename }}</span
              >
              <button
                onClick="{{ onRemove }}"
                title="Remove"
                style="
                  display: grid;
                  place-items: center;
                  width: 32px;
                  height: 32px;
                  flex: 0 0 auto;
                  background: transparent;
                  border: none;
                  border-radius: 7px;
                  color: var(--color-text-faint);
                  cursor: pointer;
                "
                style-hover="color:#c97a6a;background:rgba(201,122,106,.1)"
              >
                ✕
              </button>
            </div>
          </sc-if>
          <sc-if value="{{ noFile }}" hint-placeholder-val="{{ true }}">
            <button
              onClick="{{ onPick }}"
              style="
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                width: 100%;
                height: 42px;
                background: transparent;
                border: 1px dashed var(--color-border);
                border-radius: 8px;
                color: var(--color-text-dim);
                font-family: var(--font-sans);
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
              "
              style-hover="border-color:var(--color-accent-line);color:var(--color-text)"
            >
              ＋ {{ chooseLabel }}
            </button>
          </sc-if>
        </div>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":440,"height":70},"label":{"editor":"text","default":"Video","tsType":"string"},"filename":{"editor":"text","default":"","tsType":"string"},"chooseLabel":{"editor":"text","default":"Choose video file","tsType":"string"},"icon":{"editor":"enum","default":"video","options":["video","poster","file"],"tsType":"&apos;video&apos;|&apos;poster&apos;|&apos;file&apos;"},"onPick":{"editor":null,"tsType":"() =&gt; void"},"onRemove":{"editor":null,"tsType":"() =&gt; void"}}'
    >
      class Component extends DCLogic {
        renderVals(){
          const filename=this.props.filename||'';
          const icon=this.props.icon||'file';
          const mk=(...c)=>React.createElement('svg',{width:16,height:16,viewBox:'0 0 24 24',fill:'none'},...c);
          const icons={
            video:mk(React.createElement('rect',{x:3,y:5,width:18,height:14,rx:2,stroke:'currentColor',strokeWidth:1.6}),React.createElement('path',{d:'M10 9l5 3-5 3z',fill:'currentColor'})),
            poster:mk(React.createElement('rect',{x:3,y:4,width:18,height:16,rx:2,stroke:'currentColor',strokeWidth:1.6}),React.createElement('circle',{cx:9,cy:9,r:1.6,fill:'currentColor'}),React.createElement('path',{d:'M5 17l5-4 4 3 5-5',stroke:'currentColor',strokeWidth:1.6,strokeLinecap:'round',strokeLinejoin:'round'})),
            file:mk(React.createElement('rect',{x:5,y:3,width:14,height:18,rx:2,stroke:'currentColor',strokeWidth:1.6})),
          };
          return {
            label:this.props.label||'File', filename, hasFile:!!filename, noFile:!filename,
            chooseLabel:this.props.chooseLabel||'Choose file', iconEl:icons[icon]||icons.file,
            onPick:this.props.onPick, onRemove:this.props.onRemove,
          };
        }
      }
    </script>
  </body>
</html>
