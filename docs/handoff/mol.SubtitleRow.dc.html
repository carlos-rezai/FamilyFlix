<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="stylesheet" href="tokens.css" />
      </helmet>
      <div
        style="
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 7px 10px;
          background: var(--color-bg-2);
          border: 1px solid var(--color-border-soft);
          border-radius: 8px;
        "
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          style="flex: 0 0 auto"
        >
          <rect
            x="3"
            y="6"
            width="18"
            height="13"
            rx="2"
            stroke="var(--color-text-faint)"
            stroke-width="1.6"
          ></rect>
        </svg>
        <span
          style="
            flex: 1;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--color-text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
          "
          >{{ filename }}</span
        >
        <div style="position: relative; flex: 0 0 auto">
          <button
            onClick="{{ toggle }}"
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 8px;
              height: 34px;
              padding: 0 10px;
              min-width: 118px;
              background: var(--color-surface-2);
              border: 1px solid var(--color-border);
              border-radius: 7px;
              color: var(--color-text);
              font-family: var(--font-sans);
              font-size: 13px;
              cursor: pointer;
            "
            style-hover="border-color:var(--color-accent-line)"
          >
            {{ lang }}<span
              style="color: var(--color-text-faint); font-size: 11px"
              >▾</span
            >
          </button>
          <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
            <div
              style="
                position: absolute;
                top: 40px;
                right: 0;
                min-width: 150px;
                max-height: 220px;
                overflow-y: auto;
                background: var(--color-surface-2);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-sm);
                padding: 5px;
                box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
                animation: ffPop 0.14s ease;
                z-index: 30;
              "
            >
              <sc-for list="{{ choices }}" as="c" hint-placeholder-count="5"
                ><div
                  onClick="{{ c.choose }}"
                  style="{{ c.style }}"
                  style-hover="background:var(--color-surface-3)"
                >
                  {{ c.label }}
                </div></sc-for
              >
            </div>
          </sc-if>
        </div>
        <button
          onClick="{{ onRemove }}"
          title="Remove"
          style="
            display: grid;
            place-items: center;
            width: 32px;
            height: 32px;
            flex: 0 0 auto;
            background: transparent;
            border: none;
            border-radius: 7px;
            color: var(--color-text-faint);
            cursor: pointer;
          "
          style-hover="color:#c97a6a;background:rgba(201,122,106,.1)"
        >
          ✕
        </button>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":440,"height":56},"filename":{"editor":"text","default":"lantern_keeper.en.srt","tsType":"string"},"lang":{"editor":"text","default":"English","tsType":"string"},"langOptions":{"editor":null,"tsType":"string[]"},"onLangChange":{"editor":null,"tsType":"(lang: string) =&gt; void"},"onRemove":{"editor":null,"tsType":"() =&gt; void"}}'
    >
      class Component extends DCLogic {
        state={open:false};
        renderVals(){
          const lang=this.props.lang||'English';
          const opts=this.props.langOptions||['English','Spanish','French','German','Portuguese','Italian','Dutch'];
          const choices=opts.map(l=>({label:l, choose:()=>{ this.setState({open:false}); if(this.props.onLangChange) this.props.onLangChange(l); },
            style:{padding:'8px 12px',borderRadius:'6px',cursor:'pointer',fontFamily:'var(--font-sans)',fontSize:'13px',color:l===lang?'var(--color-accent)':'var(--color-text)',fontWeight:l===lang?'600':'400'}}));
          return {
            filename:this.props.filename||'subtitle.srt', lang, choices, open:this.state.open,
            toggle:()=>this.setState(s=>({open:!s.open})), onRemove:this.props.onRemove,
          };
        }
      }
    </script>
  </body>
</html>
