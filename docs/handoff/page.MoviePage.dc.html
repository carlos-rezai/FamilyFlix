<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="stylesheet" href="tokens.css" />
      </helmet>
      <div
        data-screen-label="Movie Detail"
        style="
          position: relative;
          height: 100%;
          overflow-y: auto;
          background: var(--color-bg);
        "
      >
        <div
          style="position: absolute; inset: 0; height: 62%; overflow: hidden"
        >
          <div style="{{ detail.posterStyle }}"></div>
          <div
            style="
              position: absolute;
              inset: 0;
              background: linear-gradient(
                180deg,
                rgba(20, 17, 13, 0.45) 0%,
                rgba(20, 17, 13, 0.82) 55%,
                var(--color-bg) 100%
              );
            "
          ></div>
        </div>

        <button
          onClick="{{ detail.onBack }}"
          style="
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 44px;
            padding: 0 18px 0 14px;
            background: rgba(20, 17, 13, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-pill);
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
          "
          style-hover="background:var(--color-surface-2)"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M15 5l-7 7 7 7"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            /></svg
          >Back
        </button>

        <div style="position: fixed; top: 24px; right: 24px; z-index: 30">
          <button
            onClick="{{ detail.onToggleEditMenu }}"
            title="Edit / delete"
            style="
              display: grid;
              place-items: center;
              width: 44px;
              height: 44px;
              background: rgba(20, 17, 13, 0.6);
              backdrop-filter: blur(10px);
              border: 1px solid var(--color-border);
              border-radius: var(--radius-pill);
              color: var(--color-text-dim);
              cursor: pointer;
            "
            style-hover="color:var(--color-text);background:var(--color-surface-2)"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="2" />
              <circle cx="12" cy="12" r="2" />
              <circle cx="12" cy="19" r="2" />
            </svg>
          </button>
          <sc-if
            value="{{ detail.editMenuOpen }}"
            hint-placeholder-val="{{ false }}"
          >
            <div
              style="
                position: absolute;
                top: 52px;
                right: 0;
                min-width: 170px;
                background: var(--color-surface-2);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                padding: 6px;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
                animation: ffPop 0.14s ease;
                z-index: 30;
              "
            >
              <div
                onClick="{{ detail.onEdit }}"
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  padding: 10px 12px;
                  border-radius: 8px;
                  cursor: pointer;
                  font-family: var(--font-sans);
                  font-size: 15px;
                  color: var(--color-text);
                "
                style-hover="background:var(--color-surface-3)"
              >
                ✎ Edit details
              </div>
              <div
                onClick="{{ detail.onToggleEditMenu }}"
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  padding: 10px 12px;
                  border-radius: 8px;
                  cursor: pointer;
                  font-family: var(--font-sans);
                  font-size: 15px;
                  color: #c97a6a;
                "
                style-hover="background:rgba(201,122,106,.12)"
              >
                🗑 Delete movie
              </div>
            </div>
          </sc-if>
        </div>

        <div
          style="
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 0 auto;
            padding: 130px var(--space-6) var(--space-8);
            display: flex;
            gap: var(--space-7);
            align-items: flex-start;
          "
        >
          <div style="flex: 0 0 300px">
            <div
              style="
                position: relative;
                width: 300px;
                aspect-ratio: 2/3;
                border-radius: var(--radius-lg);
                overflow: hidden;
                box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
                border: 1px solid var(--color-border);
              "
            >
              <div style="{{ detail.posterStyle }}"></div>
              <div
                style="
                  position: absolute;
                  left: 18px;
                  right: 18px;
                  top: 18px;
                  font-family: var(--font-sans);
                  font-size: 11px;
                  font-weight: 600;
                  letter-spacing: 1.5px;
                  text-transform: uppercase;
                  color: rgba(255, 255, 255, 0.6);
                "
              >
                {{ detail.topTag }}
              </div>
              <div
                style="
                  position: absolute;
                  left: 18px;
                  right: 18px;
                  bottom: 22px;
                  font-family: var(--font-serif);
                  font-weight: 600;
                  font-size: 27px;
                  line-height: 1.1;
                  color: #fff;
                  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.6);
                "
              >
                {{ detail.title }}
              </div>
            </div>
          </div>

          <div style="flex: 1 1 auto; min-width: 0; padding-top: 6px">
            <h1
              style="
                font-family: var(--font-serif);
                font-weight: 700;
                font-size: 48px;
                line-height: 1.04;
                color: var(--color-text);
                margin: 0;
              "
            >
              {{ detail.title }}
            </h1>

            <div
              style="
                display: flex;
                align-items: center;
                gap: 14px;
                margin-top: 14px;
                flex-wrap: wrap;
              "
            >
              <span
                style="
                  white-space: nowrap;
                  font-family: var(--font-sans);
                  font-size: 17px;
                  color: var(--color-text-dim);
                "
                >{{ detail.year }}</span
              >
              <span style="color: var(--color-text-faint)">•</span>
              <span
                style="
                  white-space: nowrap;
                  font-family: var(--font-sans);
                  font-size: 17px;
                  color: var(--color-text-dim);
                "
                >{{ detail.runtimeLabel }}</span
              >
              <span style="color: var(--color-text-faint)">•</span>
              <span
                style="
                  display: inline-flex;
                  align-items: center;
                  gap: 8px;
                  white-space: nowrap;
                "
              >
                <dc-import
                  name="prim.StarRating"
                  rating="{{ detail.ratingPct }}"
                  size="20"
                  show-value="{{ true }}"
                  hint-size="120px,24px"
                ></dc-import>
              </span>
              <sc-if
                value="{{ detail.isWatched }}"
                hint-placeholder-val="{{ false }}"
              >
                <span
                  style="
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    white-space: nowrap;
                    font-family: var(--font-sans);
                    font-size: 14px;
                    font-weight: 600;
                    color: var(--color-watched);
                    background: rgba(138, 154, 107, 0.14);
                    padding: 4px 12px;
                    border-radius: var(--radius-pill);
                  "
                  >✓ Watched</span
                >
              </sc-if>
            </div>

            <div
              style="
                display: flex;
                gap: 10px;
                margin-top: 18px;
                flex-wrap: wrap;
              "
            >
              <sc-for
                list="{{ detail.genres }}"
                as="g"
                hint-placeholder-count="2"
              >
                <dc-import
                  name="prim.Chip"
                  label="{{ g }}"
                  size="sm"
                  hint-size="80px,32px"
                ></dc-import>
              </sc-for>
            </div>

            <!-- PRIMARY ACTIONS — directly under genres, above the fold -->
            <div
              style="
                display: flex;
                align-items: center;
                gap: 14px;
                margin-top: 28px;
                flex-wrap: wrap;
              "
            >
              <dc-import
                name="prim.Button"
                label="{{ detail.playLabel }}"
                variant="primary"
                size="lg"
                icon="play"
                on-click="{{ detail.onPlay }}"
                hint-size="180px,58px"
              ></dc-import>

              <button
                onClick="{{ detail.onToggleWatched }}"
                title="{{ detail.watchedTip }}"
                aria-label="{{ detail.watchedTip }}"
                style="{{ detail.watchedIconStyle }}"
                style-hover="border-color:var(--color-accent-line);color:var(--color-accent)"
              >
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M5 12.5l4.5 4.5L19 7.5"
                    stroke="currentColor"
                    stroke-width="2.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>

              <button
                onClick="{{ detail.onToggleFavorite }}"
                title="{{ detail.favTip }}"
                aria-label="{{ detail.favTip }}"
                style="{{ detail.favIconStyle }}"
                style-hover="border-color:var(--color-accent-line);color:var(--color-accent)"
              >
                <sc-if
                  value="{{ detail.isFavorite }}"
                  hint-placeholder-val="{{ false }}"
                >
                  <svg
                    width="23"
                    height="23"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <path
                      d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                    />
                  </svg>
                </sc-if>
                <sc-if
                  value="{{ detail.notFavorite }}"
                  hint-placeholder-val="{{ true }}"
                >
                  <svg width="23" height="23" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                      stroke="currentColor"
                      stroke-width="1.9"
                      stroke-linejoin="round"
                    />
                  </svg>
                </sc-if>
              </button>
            </div>

            <!-- SYNOPSIS -->
            <div style="margin-top: 32px">
              <dc-import
                name="mol.ExpandableText"
                text="{{ detail.synopsis }}"
                lines="4"
                font-size="17"
                max-width="560"
                hint-size="560px,120px"
              ></dc-import>
            </div>

            <!-- CREDITS — quiet, full-width, below the synopsis -->
            <div
              style="
                display: flex;
                gap: var(--space-7);
                margin-top: 28px;
                flex-wrap: wrap;
              "
            >
              <div style="min-width: 0">
                <div
                  style="
                    font-family: var(--font-sans);
                    font-size: 12px;
                    font-weight: 600;
                    letter-spacing: 0.8px;
                    text-transform: uppercase;
                    color: var(--color-text-faint);
                    margin-bottom: 6px;
                  "
                >
                  Director
                </div>
                <div
                  style="
                    font-family: var(--font-sans);
                    font-size: 16px;
                    color: var(--color-text);
                  "
                >
                  {{ detail.director }}
                </div>
              </div>
              <div style="flex: 1 1 280px; min-width: 0">
                <div
                  style="
                    font-family: var(--font-sans);
                    font-size: 12px;
                    font-weight: 600;
                    letter-spacing: 0.8px;
                    text-transform: uppercase;
                    color: var(--color-text-faint);
                    margin-bottom: 6px;
                  "
                >
                  Cast
                </div>
                <div
                  style="
                    font-family: var(--font-sans);
                    font-size: 16px;
                    color: var(--color-text);
                    line-height: 1.5;
                  "
                >
                  {{ detail.castText }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":1000,"height":700},"detail":{"editor":null,"tsType":"MovieDetailModel"}}'
    ></script>
  </body>
</html>
