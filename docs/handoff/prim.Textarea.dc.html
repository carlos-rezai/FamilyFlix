<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="stylesheet" href="tokens.css" />
      </helmet>
      <textarea
        value="{{ value }}"
        onInput="{{ onInput }}"
        placeholder="{{ placeholder }}"
        style="{{ rootStyle }}"
      ></textarea>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":420,"height":140},"value":{"editor":"text","default":"","tsType":"string"},"placeholder":{"editor":"text","default":"A short synopsis of the movie","tsType":"string"},"minHeight":{"editor":"int","default":96,"min":60,"max":240,"tsType":"number"},"onInput":{"editor":null,"tsType":"(e: InputEvent) =&gt; void"}}'
    >
      class Component extends DCLogic {
        renderVals(){
          const minH=this.props.minHeight||96;
          return {
            value:this.props.value??'', onInput:this.props.onInput, placeholder:this.props.placeholder??'',
            rootStyle:{width:'100%',minHeight:minH+'px',padding:'12px 14px',background:'var(--color-surface)',border:'1px solid var(--color-border)',borderRadius:'10px',color:'var(--color-text)',fontFamily:'var(--font-sans)',fontSize:'16px',lineHeight:'1.5',outline:'none',resize:'vertical'},
          };
        }
      }
    </script>
  </body>
</html>
